<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="dist/style.css">


</head>

<body>

  <article class="card">
    <picture class="card__img">
      <source srcset="assets/images/illustration-article.svg" type="image/svg">
      <img src="assets/images/illustration-article.jpg" alt="Abstract illustration with design elements and HTML code." width="336" height="201">
    </picture>
    <section class="card__info-container">
      <span class="card__category">Learning</span>
      <span class="card__publish-date">Published 21 Dec 2023</span>
      <h1 class="card__title">HTML & CSS foundations</h1>
      <p class="card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </section>
    <div class="card__author">
      <picture class="card__author-img">
        <source srcset="assets/images/image-avatar.webp" type="image/webp">
        <img src="assets/images/image-avatar.jpeg" alt="Greg Hooper" width="64" height="65">
      </picture>
      <span class="card__author-name">Greg Hooper</span>
    </div>
  </article>

</body>

</html>
